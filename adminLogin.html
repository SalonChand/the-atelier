<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0e0e0d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="The Atelier"/>
<link rel="apple-touch-icon" href="logo.png"/>
<link rel="manifest" href="manifest.json"/>
<title>Admin Login | THE ATELIER</title>
<meta name="description" content="Staff portal login for The Atelier administration."/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@1,6..72,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { --ink: #0e0e0d; --cream: #f4f1ec; --warm: #c8b89a; --accent: #8b5e3c; --error: #8b1a1a; }
  body { font-family: 'Jost', sans-serif; background: var(--ink); color: var(--cream); min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
  @media (max-width: 768px) { body { grid-template-columns: 1fr; } .side-art { display: none; } }

  .side-art {
    position: relative; overflow: hidden;
    background: #1a1714;
  }
  .side-art img { width: 100%; height: 100%; object-fit: cover; opacity: 0.55; }
  .side-art-caption {
    position: absolute; bottom: 3rem; left: 3rem;
    font-family: 'Newsreader', serif; font-style: italic;
    font-size: 2.5rem; color: rgba(244,241,236,0.8);
    line-height: 1.1; max-width: 300px;
  }

  .login-panel { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 4rem 3rem; }
  .login-logo { text-decoration: none; margin-bottom: 0.5rem; display:flex;justify-content:center; }
  .login-subtitle { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #8a7f73; margin-bottom: 4rem; }

  .login-box { width: 100%; max-width: 360px; }
  .login-title { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #6b6258; margin-bottom: 2.5rem; }

  .form-group { margin-bottom: 1.5rem; }
  label { display: block; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: #6b6258; margin-bottom: 0.5rem; }
  input {
    width: 100%; padding: 0.8rem 0; background: transparent;
    border: none; border-bottom: 1px solid rgba(200,184,154,0.25);
    font-family: 'Jost'; font-size: 0.85rem; color: var(--cream); outline: none;
    transition: border-color 0.2s;
  }
  input::placeholder { color: #4a453f; }
  input:focus { border-color: var(--warm); }
  input.invalid { border-color: var(--error); }

  .error-msg { font-size: 0.65rem; color: #e8a0a0; text-align: center; margin-bottom: 1rem; min-height: 1rem; }

  .login-btn {
    width: 100%; padding: 1.1rem; background: var(--cream); color: var(--ink);
    border: none; font-family: 'Jost'; font-size: 0.6rem; letter-spacing: 0.22em;
    text-transform: uppercase; cursor: pointer; transition: all 0.3s; margin-top: 1rem;
  }
  .login-btn:hover { background: var(--warm); }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .forgot-link { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: #6b6258; text-decoration: none; transition: color 0.2s; }
  .forgot-link:hover { color: var(--warm); }

  .back-link { margin-top: 3rem; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: #4a453f; text-decoration: none; display: block; text-align: center; transition: color 0.2s; }
  .back-link:hover { color: var(--warm); }


</style>
<link rel="stylesheet" href="mobile-app.css"/>
<script src="sync-config.js"></script>
<script src="sync.js"></script>
</head>
<body>

<div class="side-art">
  <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuD58X9mNKlcoMnVue7EQjJDzmq-BCc3Z5Y9VpeGv-Pg53ycWRzD9i_2ntIxKdW7sbPAzrPiUOU7akCjlfPTNlpYw7ljLET_EUTFlA2iW8d0Z3XIcs9USdeFL0Zqiweq6oh81hPYxEHiAvA3NkEnHE-bAgZoPe8BHhBSHa5Wi8cxh-m3P_Rsldy2gJyzi2EDiKL-Uw-OIQ6YLU8vezuERQEyaqmPwGLwLyG5QqjaFpn5Dj17uVS_yzWyfnLWg-w9q1jFI_4YMVD0kDTp" alt="Atelier"/>
  <div class="side-art-caption">The House<br/>of<br/>The Atelier</div>
</div>

<div class="login-panel">
  <a href="index.html" class="login-logo"><img src="logo.png" alt="The Atelier" style="height:72px;width:auto;object-fit:contain;filter:brightness(1.1);"/></a>
  <p class="login-subtitle">Administration Portal</p>

  <div class="login-box">
    <p class="login-title">Sign in to continue</p>

    <p class="error-msg" id="error-msg"></p>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="admin@theatelier.com"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>

    <button class="login-btn" id="login-btn">Sign In</button>
    <a href="#" class="forgot-link">Forgot password?</a>



    <a href="index.html" class="back-link">← Return to Store</a>
  </div>
</div>

<script>
  // Always ensure the correct superadmin exists (fixes stale localStorage)
  (function() {
    const admins = JSON.parse(localStorage.getItem('atelier_admins') || '[]');
    const hasCorrect = admins.find(function(a) { return a.email.toLowerCase() === 'admin@theatelier.com'; });
    if (!hasCorrect) {
      admins.unshift({ email: 'admin@theatelier.com', password: 'atelier2025', role: 'superadmin' });
      localStorage.setItem('atelier_admins', JSON.stringify(admins));
    }
  })();

  function doLogin() {
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var btn = document.getElementById('login-btn');
    var err = document.getElementById('error-msg');

    if (!email || !password) {
      err.textContent = 'Please enter your credentials.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    err.textContent = '';

    setTimeout(function() {
      var admins = JSON.parse(localStorage.getItem('atelier_admins') || '[]');
      var user = null;
      for (var i = 0; i < admins.length; i++) {
        if (admins[i].email.toLowerCase() === email.toLowerCase() && admins[i].password === password) {
          user = admins[i];
          break;
        }
      }

      if (user) {
        localStorage.setItem('atelier_admin', '1');
        localStorage.setItem('atelier_current_user', user.email);
        localStorage.setItem('atelier_current_role', user.role);
        window.location.href = 'analyticsDashboard.html';
      } else {
        err.textContent = 'Incorrect email or password.';
        document.getElementById('email').classList.add('invalid');
        document.getElementById('password').classList.add('invalid');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }, 1000);
  }

  document.getElementById('login-btn').addEventListener('click', doLogin);

  // Allow Enter key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  // Remove invalid state on typing
  ['email', 'password'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', function() {
      this.classList.remove('invalid');
      document.getElementById('error-msg').textContent = '';
    });
  });

</script>
<script src="mobile-app.js"></script>
</body>
</html>
