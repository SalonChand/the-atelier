<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0e0e0d"/>
<title>Page Not Found | The Atelier</title>
<meta name="description" content="The page you're looking for doesn't exist."/>
<meta name="robots" content="noindex, nofollow"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;1,6..72,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
:root { --ink: #0e0e0d; --cream: #f4f1ec; --warm: #c8b89a; --accent: #8b5e3c; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.notfound { max-width: 480px; text-align: center; }
.notfound .num { font-family: 'Newsreader', serif; font-style: italic; font-size: 6rem; line-height: 1; color: var(--warm); margin-bottom: 1rem; }
.notfound h1 { font-family: 'Newsreader', serif; font-style: italic; font-size: 2rem; margin-bottom: 1rem; letter-spacing: -0.01em; }
.notfound p { font-size: 0.85rem; color: #6b6258; line-height: 1.7; margin-bottom: 2rem; }
.notfound a { display: inline-block; padding: 0.95rem 2.25rem; background: var(--ink); color: var(--cream); text-decoration: none; font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; transition: opacity 0.2s; }
.notfound a:hover { opacity: 0.85; }
</style>
</head>
<body>
  <div class="notfound">
    <div class="num">404</div>
    <h1>Page Not Found</h1>
    <p>This page doesn't exist or has been moved. If you reached this page via an old link, it may have been retired.</p>
    <a href="index.html">Return to The Atelier</a>
  </div>
</body>
</html>
