<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0e0e0d"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="logo.png"/>
<title>Signing You In | THE ATELIER</title>
<meta name="robots" content="noindex, nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;1,6..72,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
:root { --ink: #0e0e0d; --cream: #f4f1ec; --warm: #c8b89a; --accent: #8b5e3c; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }

.auth-card { max-width: 440px; width: 100%; background: white; padding: 3rem 2rem; text-align: center; border: 1px solid rgba(200,184,154,0.3); }
.brand { font-family: 'Newsreader', serif; font-style: italic; font-size: 1.4rem; letter-spacing: 0.03em; margin-bottom: 2.5rem; color: var(--ink); }

.spinner { width: 36px; height: 36px; border: 2px solid rgba(200,184,154,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 1.5rem; }
@keyframes spin { to { transform: rotate(360deg); } }

.title { font-family: 'Newsreader', serif; font-style: italic; font-size: 1.6rem; margin-bottom: 0.6rem; }
.subtitle { font-size: 0.78rem; color: #6b6258; line-height: 1.7; margin-bottom: 1.5rem; }

.field { margin: 1.5rem 0 1rem; text-align: left; }
.field label { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: #8a7f73; display: block; margin-bottom: 0.5rem; }
.field input { width: 100%; padding: 0.85rem 1rem; border: 1px solid rgba(200,184,154,0.4); font-family: 'Jost'; font-size: 0.85rem; background: white; outline: none; }
.field input:focus { border-color: var(--accent); }

.btn { background: var(--ink); color: var(--cream); border: none; padding: 0.95rem 1.5rem; font-family: 'Jost'; font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; width: 100%; transition: opacity 0.2s; }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn.secondary { background: white; color: var(--ink); border: 1px solid rgba(200,184,154,0.4); margin-top: 0.5rem; }

.error { color: #b71c1c; font-size: 0.72rem; padding: 0.85rem; background: #fee2e2; border-left: 3px solid #b71c1c; margin: 1.25rem 0; line-height: 1.6; text-align: left; display: none; }
.error.show { display: block; }

.success-icon { font-size: 2.5rem; color: var(--accent); margin-bottom: 0.85rem; }
</style>
</head>
<body>

<div class="auth-card">
  <div class="brand">The Atelier</div>

  <!-- Loading state -->
  <div id="state-loading">
    <div class="spinner"></div>
    <p class="title">Signing you in</p>
    <p class="subtitle">One moment, please…</p>
  </div>

  <!-- Email confirmation needed (when localStorage email is missing — user opened link on different device) -->
  <div id="state-confirm-email" style="display:none;">
    <p class="title">Confirm Your Email</p>
    <p class="subtitle">We need to verify it's you. Please enter the email address that received the sign-in link.</p>
    <div class="error" id="confirm-error"></div>
    <div class="field">
      <label for="confirm-email">Your email</label>
      <input type="email" id="confirm-email" placeholder="you@example.com" autocomplete="email" autocapitalize="off" autocorrect="off"/>
    </div>
    <button class="btn" onclick="completeWithEmail()">✦ Sign In</button>
  </div>

  <!-- Success -->
  <div id="state-success" style="display:none;">
    <div class="success-icon">✓</div>
    <p class="title">Welcome</p>
    <p class="subtitle">You're signed in. Taking you to your orders…</p>
  </div>

  <!-- Error -->
  <div id="state-error" style="display:none;">
    <p class="title" style="color:#b71c1c;">Something went wrong</p>
    <p class="subtitle" id="error-msg">The sign-in link may have expired or already been used.</p>
    <button class="btn" onclick="window.location.href='customerLogin.html'">Request New Link</button>
    <button class="btn secondary" onclick="window.location.href='index.html'">Back to Home</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyCqDm6B0JoILcHHFqO6w2El64UhVS5WgDs",
  authDomain: "the-atelier-ce832.firebaseapp.com",
  databaseURL: "https://the-atelier-ce832-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "the-atelier-ce832",
  storageBucket: "the-atelier-ce832.firebasestorage.app",
  messagingSenderId: "119477694873",
  appId: "1:119477694873:web:827bc0b07f034b47b7a308"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

function showState(id) {
  ['state-loading', 'state-confirm-email', 'state-success', 'state-error'].forEach(function(s) {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = 'block';
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg || 'The sign-in link may have expired or already been used.';
  showState('state-error');
}

function showConfirmError(msg) {
  var el = document.getElementById('confirm-error');
  el.textContent = msg;
  el.classList.add('show');
}

// On load, attempt to complete sign-in
(function init() {
  if (!firebase.auth().isSignInWithEmailLink(window.location.href)) {
    showError('This page is only for sign-in links.');
    return;
  }

  // Get email — first from localStorage, then prompt user
  var email = '';
  try { email = localStorage.getItem('atelier_pending_signin_email') || ''; } catch(e) {}

  if (!email) {
    // User opened link on a different device — prompt for email
    showState('state-confirm-email');
    return;
  }

  completeSignIn(email);
})();

function completeSignIn(email) {
  showState('state-loading');
  firebase.auth().signInWithEmailLink(email, window.location.href)
    .then(function(result) {
      try { localStorage.removeItem('atelier_pending_signin_email'); } catch(e) {}
      try { localStorage.setItem('atelier_customer_email', result.user.email); } catch(e) {}
      showState('state-success');
      // Redirect to "My Orders"
      setTimeout(function() {
        var redirectTo = 'myOrders.html';
        try {
          var saved = sessionStorage.getItem('atelier_redirect_after_login');
          if (saved) { redirectTo = saved; sessionStorage.removeItem('atelier_redirect_after_login'); }
        } catch(e) {}
        window.location.href = redirectTo;
      }, 1200);
    })
    .catch(function(err) {
      console.error('Sign-in error:', err);
      var msg = 'The sign-in link is invalid or has expired.';
      if (err.code === 'auth/invalid-action-code') msg = 'This sign-in link has expired or already been used. Please request a new one.';
      else if (err.code === 'auth/expired-action-code') msg = 'This sign-in link has expired. Please request a new one.';
      else if (err.code === 'auth/invalid-email') msg = 'The email address you entered does not match the sign-in link.';
      else if (err.code === 'auth/user-disabled') msg = 'This account has been disabled. Please contact support.';
      showError(msg);
    });
}

function completeWithEmail() {
  var email = (document.getElementById('confirm-email').value || '').trim().toLowerCase();
  if (!email || email.indexOf('@') === -1) {
    showConfirmError('Please enter a valid email.');
    return;
  }
  completeSignIn(email);
}

// Press Enter to submit
document.getElementById('confirm-email').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') completeWithEmail();
});
</script>

</body>
</html>
